name: Supabase Keepalive

on:
  schedule:
    - cron: '17 3 */3 * *'
  workflow_dispatch:

jobs:
  ping-supabase:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Ping Supabase blog endpoint
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "Missing SUPABASE_URL or SUPABASE_ANON_KEY GitHub secret."
            exit 1
          fi

          RESPONSE=$(curl --silent --show-error --fail \
            --retry 3 \
            --retry-delay 5 \
            --max-time 30 \
            --header "apikey: $SUPABASE_ANON_KEY" \
            --header "Authorization: Bearer $SUPABASE_ANON_KEY" \
            --header "Accept: application/json" \
            --header "User-Agent: github-actions-supabase-keepalive" \
            "$SUPABASE_URL/rest/v1/blog_posts?select=id&limit=1&status=eq.published")

          echo "Supabase responded successfully."
          echo "$RESPONSE"
